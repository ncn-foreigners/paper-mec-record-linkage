    "doFuture": {
      "Package": "doFuture",
      "Version": "1.2.2",
      "Source": "Repository",
      "Title": "Use Foreach to Parallelize via the Future Framework",
      "Depends": [
        "foreach (>= 1.5.0)",
        "future (>= 1.49.0)"
      ],
      "Imports": [
